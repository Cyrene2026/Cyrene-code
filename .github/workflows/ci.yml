name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/frontend/components/v2/go.mod
          cache-dependency-path: src/frontend/components/v2/go.sum

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle and Go binary
        env:
          GOCACHE: ${{ runner.temp }}/go-build-cache
        run: bun run build

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun test

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/frontend/components/v2/go.mod
          cache-dependency-path: src/frontend/components/v2/go.sum

      - name: Run Go test suite
        working-directory: src/frontend/components/v2
        env:
          GOCACHE: ${{ runner.temp }}/go-build-cache
        run: go test ./...

  stability_fast:
    name: Stability Fast (randomized)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run randomized repeat test suite (fast)
        run: bun test --randomize --rerun-each 2 --max-concurrency 1

  stability_deep:
    name: Stability Deep (randomized)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run randomized repeat test suite (deep)
        run: bun test --randomize --rerun-each 5 --max-concurrency 1
